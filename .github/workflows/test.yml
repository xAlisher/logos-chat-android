name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: JS logic tests (wire codec + store view helpers)
        run: npm run test:logic

  kotlin-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - name: Kotlin unit tests (Robolectric — schema, epochs, merge, ns-timestamp)
        working-directory: android
        run: ./gradlew testDebugUnitTest
